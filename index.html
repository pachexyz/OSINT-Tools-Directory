<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OSINT Tools Directory</title>
    <meta name="description" content="Directorio corporativo y centralizado de herramientas OSINT automatizado con IA.">
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <!-- Google Fonts: Manrope & Space Mono -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <div class="logo">
            <svg class="logo-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="38" height="38">
                <circle cx="50" cy="50" r="25" stroke="#ffffff" stroke-width="8" fill="none" />
                <line x1="50" y1="12" x2="50" y2="25" stroke="#ffffff" stroke-width="8" stroke-linecap="round" />
                <line x1="50" y1="75" x2="50" y2="88" stroke="#ffffff" stroke-width="8" stroke-linecap="round" />
                <line x1="12" y1="50" x2="25" y2="50" stroke="#ffffff" stroke-width="8" stroke-linecap="round" />
                <line x1="75" y1="50" x2="88" y2="50" stroke="#ffffff" stroke-width="8" stroke-linecap="round" />
                <circle cx="50" cy="50" r="6" fill="#ffffff" />
            </svg>
            OSINT Tools Directory
        </div>
        <p class="subtitle" id="mainSubtitle">Directorio de herramientas de inteligencia de fuentes abiertas, monitoreado y actualizado
            mediante procesamiento IA.</p>
    </header>

    <div class="controls">
        <input type="text" id="searchBar" placeholder="Buscar herramientas por nombre, descripción o palabras clave...">
        <div class="filter-chips" id="categoryFilters">
            <span class="chip active" data-category="all">Todas</span>
            <!-- Se llenará dinámicamente -->
        </div>
    </div>



    <main class="tool-grid" id="mainGrid">
        <!-- Todas las herramientas aquí -->
    </main>

    <div style="text-align: center; margin: 3rem 0;">
        <button id="loadMoreBtn" class="btn-primary" style="display: none;">Cargar Más Herramientas</button>
    </div>

    <footer>
        <div class="footer-content">
            <p>Directorio mantenido por <strong>fud0dev</strong></p>
            <p class="sub-footer">Plataforma automatizada con Llama 3.</p>
            <a href="https://github.com/fud0dev/OSINT-Tools-Directory/issues" class="footer-link" target="_blank">Añadir
                una herramienta vía GitHub Issues &rarr;</a>
        </div>
    </footer>

    <!-- Modal Overlay -->
    <div id="toolModal" class="modal-overlay">
        <div class="modal-container">
            <div class="modal-header">
                <h3 id="modalTitle">Tool Name</h3>
                <button class="modal-close" id="modalClose">&times;</button>
            </div>
            <div class="modal-body">
                <p id="modalDesc" class="modal-desc"></p>
                <div id="modalTags" class="card-tags"></div>
            </div>
            <div class="modal-footer">
                <a href="#" id="modalLink" target="_blank" class="btn-primary">Visitar Repositorio 🚀</a>
                <button id="modalCopyBtn" class="btn-secondary">🔗 Copiar Enlace</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
